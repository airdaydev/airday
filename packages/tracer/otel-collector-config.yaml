receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

exporters:
  # Jaeger exporter
  jaeger:
    endpoint: jaeger-collector:14250
    tls:
      insecure: true

  # SigNoz exporter
  # otlp/signoz:
  #   endpoint: http://signoz-otel-collector:4317
  #   tls:
  #     insecure: true
  #   headers:
  # Add any required headers for SigNoz if needed
  # "signoz-access-token": "your-token-here"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [jaeger, otlp/signoz]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/signoz]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/signoz]

  extensions: []
