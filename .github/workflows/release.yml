name: Release

# Build the web client, embed it into the server binary (feature `bundled-web`),
# then publish (1) the binary + SHA-256 checksum as a GitHub Release and (2) a
# container image to GHCR. Triggers on v-prefixed tags only (e.g. v0.0.1-alpha)
# — never on branch pushes.
on:
  push:
    tags:
      - "v*"

# A release tag is immutable; don't run two builds for the same ref.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the release and upload binary + checksum
  packages: write # push the container image to GHCR

env:
  TARGET: x86_64-unknown-linux-gnu

jobs:
  release:
    # Pinned to a fixed Ubuntu (glibc 2.35) rather than ubuntu-latest: an older
    # build-time glibc runs on the widest range of deploy hosts, and a fixed
    # version keeps the build reproducible.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      # The web client imports @airday/core, whose browser export resolves to
      # the bundler-target wasm in js/core/wasm-web — build it before vite.
      - name: Build browser wasm
        run: bun run build:wasm:web

      - name: Build web client (js/web/dist)
        run: bun run --cwd js/web build

      # Embeds js/web/dist into the binary via rust-embed at compile time.
      - name: Build server with embedded web
        run: cargo build --release -p airday-server --features bundled-web

      - name: Package binary + checksum
        id: package
        run: |
          set -euo pipefail
          name="airday-server-${GITHUB_REF_NAME}-${TARGET}"
          mkdir -p dist-release
          cp target/release/airday-server "dist-release/${name}"
          cd dist-release
          sha256sum "${name}" > "${name}.sha256"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Tags with a hyphen (v0.0.1-alpha, -beta, -rc) are pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist-release/${{ steps.package.outputs.name }}
            dist-release/${{ steps.package.outputs.name }}.sha256

      # --- Container image -> GHCR ----------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Plain docker build/push (docker is preinstalled on the runner) keeps the
      # new third-party-action surface to just the official login action. The
      # binary is staged into a tiny context so the daemon isn't handed the
      # whole repo. Image is tagged ghcr.io/<owner>/<repo>-server:<git-tag>.
      - name: Build and push image
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY}-server"
          mkdir -p docker-ctx
          cp target/release/airday-server docker-ctx/
          docker build -f deploy/Dockerfile -t "${image}:${GITHUB_REF_NAME}" docker-ctx
          docker push "${image}:${GITHUB_REF_NAME}"
          echo "Pushed ${image}:${GITHUB_REF_NAME}"
